name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli

      # 这些步骤本身不依赖平台差异，但放进三平台矩阵可以及早暴露
      # path / shell / home directory 等跨平台回归。
      - name: Lint TOML
        run: taplo lint

      - name: Check formatting
        run: |
          cargo fmt --all -- --check
          taplo format --check

      - name: Lint Rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets --all-features

  e2e:
    name: Offline E2E (Linux)
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # E2E 当前会启动本地 mock provider 并完整走一遍 runtime，
      # 保留在 Linux 单独执行，避免每个平台都复制同样的重型链路。
      - name: Run offline E2E
        run: cargo test -p nanobot --test e2e_local -- --nocapture
