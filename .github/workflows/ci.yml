name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install build deps
        run: ./scripts/install-deps.sh

      - name: Install Taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli

      - name: Lint TOML
        run: taplo lint

      - name: Check formatting
        run: |
          cargo fmt --all -- --check
          taplo format --check

      - name: Lint Rust
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.1

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install build deps
        shell: bash
        run: ./scripts/install-deps.sh

      - name: Test
        run: cargo test --all-targets --all-features
        if: matrix.os != 'windows-latest'

      - name: Build
        run: cargo build --all-targets --all-features
        if: matrix.os == 'windows-latest'

  e2e:
    name: Offline E2E (Linux)
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.1

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install build deps
        run: ./scripts/install-deps.sh

      - name: Run offline E2E
        run: cargo test -p nanobot --test e2e_local -- --nocapture
